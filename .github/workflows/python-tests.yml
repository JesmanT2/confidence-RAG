name: Python tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          echo "--- Python and pip versions ---"
          python --version
          python -m pip --version
          echo "--- Upgrade packaging tools ---"
          python -m pip install --upgrade pip setuptools wheel
          echo "--- Install requirements (verbose) ---"
          python -m pip install -r requirements.txt -v
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "--- pytest version and environment ---"
          pytest --version
          python -c "import sys, platform; print(sys.executable, platform.platform())"
          echo "--- Running tests (verbose) ---"
          pytest -q -r a
